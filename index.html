<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Mela 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#02000a;}
body{cursor:none;font-family:'EB Garamond',serif;}

/* CURSOR */
#cur{position:fixed;width:10px;height:10px;background:#d4a847;border-radius:50%;
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;
  transition:transform .15s;}
#cur2{position:fixed;width:24px;height:24px;border:1px solid rgba(212,168,71,.42);border-radius:50%;
  pointer-events:none;z-index:9998;transform:translate(-50%,-50%);
  transition:left .09s,top .09s;}

/* CANVAS */
#cv{position:fixed;top:0;left:0;width:100%;height:100%;display:block;}

/* ── LOCK UI ── */
#lockUI{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:0 20px 4vh;
  pointer-events:none;
  transition:opacity .8s;
}
#lockUI.hide{opacity:0;pointer-events:none;}

.glass{
  pointer-events:auto;
  width:min(360px,90vw);
  background:linear-gradient(145deg,rgba(10,0,28,.93),rgba(18,0,42,.90));
  border:1px solid rgba(212,168,71,.16);
  border-radius:3px;
  padding:26px 32px 22px;
  text-align:center;
  backdrop-filter:blur(30px) saturate(1.4);
  box-shadow:0 0 60px rgba(80,20,160,.14),0 0 120px rgba(80,20,160,.07),
             inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;
}
.glass::before,.glass::after{
  content:'';position:absolute;width:12px;height:12px;
  border-color:rgba(212,168,71,.4);border-style:solid;
}
.glass::before{top:7px;left:7px;border-width:1px 0 0 1px;}
.glass::after{bottom:7px;right:7px;border-width:0 1px 1px 0;}

.g-tag{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:7px;
  color:rgba(212,168,71,.42);text-transform:uppercase;margin-bottom:11px;}
.g-title{font-family:'Cinzel Decorative',serif;font-size:clamp(.9rem,2.8vw,1.25rem);
  color:#fef0dc;letter-spacing:2px;margin-bottom:4px;
  text-shadow:0 0 28px rgba(212,168,71,.22);}
.g-sub{font-family:'EB Garamond',serif;font-style:italic;font-size:.8rem;
  color:rgba(200,162,100,.48);margin-bottom:18px;}

.orn{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:16px;}
.ol{flex:1;max-width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,71,.32));}
.or{flex:1;max-width:44px;height:1px;background:linear-gradient(90deg,rgba(212,168,71,.32),transparent);}
.od{width:5px;height:5px;background:#d4a847;transform:rotate(45deg);
  box-shadow:0 0 7px rgba(212,168,71,.55);}

#inp{
  width:100%;padding:11px 16px;margin-bottom:9px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(212,168,71,.16);border-radius:2px;
  color:#fef0dc;font-family:'Cinzel',serif;font-size:.8rem;
  letter-spacing:4px;text-align:center;text-transform:uppercase;outline:none;
  transition:border .3s,box-shadow .3s,background .3s;
}
#inp::placeholder{font-family:'EB Garamond',serif;font-style:italic;
  font-size:.75rem;letter-spacing:2px;text-transform:none;color:rgba(200,152,90,.2);}
#inp:focus{border-color:rgba(212,168,71,.48);background:rgba(212,168,71,.025);
  box-shadow:0 0 20px rgba(212,168,71,.05);}
#inp.err{border-color:rgba(255,70,70,.7);box-shadow:0 0 18px rgba(255,70,70,.12);
  animation:shk .42s;}
#inp.ok {border-color:rgba(80,255,140,.65);box-shadow:0 0 18px rgba(80,255,140,.1);}
@keyframes shk{0%,100%{transform:translateX(0)}22%{transform:translateX(-9px)}66%{transform:translateX(9px)}}

#btn{
  width:100%;padding:11px 0;
  background:transparent;border:1px solid rgba(212,168,71,.26);
  color:#d4a847;font-family:'Cinzel',serif;font-size:.58rem;
  letter-spacing:5px;text-transform:uppercase;cursor:pointer;border-radius:2px;
  transition:all .3s;position:relative;overflow:hidden;
}
#btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,168,71,.06),transparent);
  opacity:0;transition:opacity .3s;}
#btn:hover{border-color:rgba(212,168,71,.6);color:#f0c96a;
  box-shadow:0 0 24px rgba(212,168,71,.1);}
#btn:hover::after{opacity:1;}
#btn:active{transform:scale(.975);}

#emsg{font-family:'EB Garamond',serif;font-style:italic;
  font-size:.74rem;color:rgba(255,95,95,.78);min-height:16px;margin-top:8px;
  transition:opacity .3s;}
.hint-txt{font-family:'EB Garamond',serif;font-style:italic;
  font-size:.6rem;color:rgba(200,152,90,.17);letter-spacing:2px;margin-top:11px;}

/* ── SUCCESS ── */
#sucUI{
  position:fixed;inset:0;z-index:40;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.scard{
  width:min(460px,90vw);
  background:linear-gradient(150deg,rgba(8,0,22,.97),rgba(20,0,48,.94));
  border:1px solid rgba(212,168,71,.2);border-radius:3px;
  padding:44px 48px 40px;text-align:center;
  backdrop-filter:blur(36px);
  box-shadow:0 0 80px rgba(212,168,71,.06),0 0 160px rgba(100,20,200,.08),
             inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;animation:cardIn 1.1s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.96)}to{opacity:1;transform:none}}
.scard .c1{position:absolute;top:9px;left:9px;width:15px;height:15px;
  border-top:1px solid rgba(212,168,71,.4);border-left:1px solid rgba(212,168,71,.4);}
.scard .c2{position:absolute;top:9px;right:9px;width:15px;height:15px;
  border-top:1px solid rgba(212,168,71,.4);border-right:1px solid rgba(212,168,71,.4);}
.scard .c3{position:absolute;bottom:9px;left:9px;width:15px;height:15px;
  border-bottom:1px solid rgba(212,168,71,.4);border-left:1px solid rgba(212,168,71,.4);}
.scard .c4{position:absolute;bottom:9px;right:9px;width:15px;height:15px;
  border-bottom:1px solid rgba(212,168,71,.4);border-right:1px solid rgba(212,168,71,.4);}

.s-eye{font-family:'Cinzel',serif;font-size:.45rem;letter-spacing:7px;
  color:rgba(212,168,71,.36);text-transform:uppercase;margin-bottom:18px;
  animation:fadeUp .8s .3s both;}
.s-love{font-family:'Cinzel Decorative',serif;
  font-size:clamp(2.2rem,8vw,4rem);color:#fef0dc;letter-spacing:4px;line-height:1.05;
  text-shadow:0 0 50px rgba(212,168,71,.3),0 0 100px rgba(212,168,71,.1);
  margin-bottom:8px;animation:fadeUp .8s .6s both;}
.s-name{font-family:'Cinzel',serif;font-size:clamp(.85rem,3vw,1.2rem);
  letter-spacing:8px;color:#d4a847;text-transform:uppercase;
  margin-bottom:26px;animation:fadeUp .8s .9s both;}
.s-div{width:42px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,71,.55),transparent);
  margin:0 auto 20px;animation:fadeUp .8s 1.1s both;}
.s-poem{font-family:'EB Garamond',serif;font-style:italic;
  font-size:clamp(.88rem,2.5vw,1.05rem);color:rgba(220,195,158,.6);
  line-height:2.1;animation:fadeUp .8s 1.3s both;}
.s-heart{margin-top:24px;font-size:1.6rem;display:block;
  animation:hb 1.35s 2s ease-in-out infinite,fadeUp .8s 1.6s both;}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.22)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* sparks */
.spk{position:fixed;border-radius:50%;pointer-events:none;z-index:55;
  animation:spkFly var(--d) ease-out forwards;}
@keyframes spkFly{0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur2"></div>
<canvas id="cv"></canvas>

<div id="lockUI">
  <div class="glass">
    <p class="g-tag">✦ Message Scellé ✦</p>
    <h2 class="g-title">Accès Interdit</h2>
    <p class="g-sub">Un guerrier de l'ombre veille sur ce secret</p>
    <div class="orn"><div class="ol"></div><div class="od"></div><div class="or"></div></div>
    <input id="inp" type="text" placeholder="Entre un prénom…" maxlength="22"
      autocomplete="off" spellcheck="false">
    <button id="btn" onclick="tryCode()">⚔ &nbsp; Présenter le Sésame</button>
    <p id="emsg"></p>
    <p class="hint-txt">kouadio · mela · marie · christianne</p>
  </div>
</div>

<div id="sucUI">
  <div class="scard">
    <div class="c1"></div><div class="c2"></div>
    <div class="c3"></div><div class="c4"></div>
    <p class="s-eye">✦ Message Délivré ✦</p>
    <div class="s-love">I Love You</div>
    <div class="s-name">Frontini ♥</div>
    <div class="s-div"></div>
    <p class="s-poem">
      Dans chaque battement de mon cœur,<br>
      dans chaque étoile de cette nuit —<br>
      c'est toi, Mela, que je chéris<br>
      pour l'éternité.
    </p>
    <span class="s-heart">♥</span>
  </div>
</div>

<script>
"use strict";
/* =============================================
   CURSOR
============================================= */
const cur=document.getElementById('cur');
const cur2=document.getElementById('cur2');
let MX=innerWidth/2,MY=innerHeight/2;
document.addEventListener('mousemove',e=>{
  MX=e.clientX; MY=e.clientY;
  cur.style.left=MX+'px'; cur.style.top=MY+'px';
  setTimeout(()=>{cur2.style.left=MX+'px';cur2.style.top=MY+'px';},80);
});

/* =============================================
   CANVAS
============================================= */
const CV=document.getElementById('cv');
const X=CV.getContext('2d');
let W,H;
function resize(){W=CV.width=innerWidth;H=CV.height=innerHeight;}
resize(); window.addEventListener('resize',resize);

/* =============================================
   STATE
============================================= */
let TICK=0;
// phase: idle | attack | returning | leaving | open
let phase='idle';
let atkTimer=0;   // 0-60 attack animation
let retTimer=0;   // 0-35 return
let leaveX=0;     // warrior x when leaving
let openTick=0;   // tick when envelope opened
let parts=[];     // particles
let shake={x:0,y:0,p:0}; // screen shake

/* =============================================
   STARS  (parallax layers)
============================================= */
const STARS=[];
for(let i=0;i<260;i++){
  STARS.push({
    x:Math.random(), y:Math.random(),
    r:Math.random()*1.6+.25,
    ph:Math.random()*Math.PI*2,
    sp:Math.random()*.006+.002,
    layer:Math.floor(Math.random()*3) // 0=far 2=close
  });
}

/* =============================================
   UTILS
============================================= */
function rr(x,y,w,h,r){
  X.beginPath();
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);
  X.closePath();
}
function circle(x,y,r){X.beginPath();X.arc(x,y,r,0,Math.PI*2);}
function lg(x0,y0,x1,y1,...stops){
  const g=X.createLinearGradient(x0,y0,x1,y1);
  stops.forEach((s,i)=>g.addColorStop(i/(stops.length-1),s));
  return g;
}
function rg(x,y,r0,r1,...stops){
  const g=X.createRadialGradient(x,y,r0,x,y,r1);
  stops.forEach((s,i)=>g.addColorStop(i/(stops.length-1),s));
  return g;
}

/* =============================================
   PARTICLES
============================================= */
function burst(x,y,n,colors,spd=5,spread=1){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*spd+1;
    parts.push({
      x,y,
      vx:Math.cos(a)*s*spread,
      vy:Math.sin(a)*s-spd*.3,
      g:.09+Math.random()*.06,
      sz:Math.random()*5+1.5,
      col:colors[Math.floor(Math.random()*colors.length)],
      life:1,
      dc:.009+Math.random()*.012,
      type:Math.random()>.5?'circle':'star'
    });
  }
}
function drawParts(){
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.life-=p.dc;
    if(p.life<=0) return;
    X.save();
    X.globalAlpha=p.life*p.life;
    X.fillStyle=p.col;
    X.shadowColor=p.col; X.shadowBlur=6;
    if(p.type==='star'){
      X.translate(p.x,p.y);
      X.rotate(TICK*.05);
      drawStar(X,0,0,p.sz*p.life,p.sz*p.life*.45,4);
    } else {
      circle(p.x,p.y,p.sz*p.life);X.fill();
    }
    X.restore();
  });
  parts=parts.filter(p=>p.life>0);
}
function drawStar(ctx,cx,cy,outer,inner,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a=(i*Math.PI/pts)-Math.PI/2;
    const r=i%2===0?outer:inner;
    i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r)
        :ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
}

/* =============================================
   MAIN LOOP
============================================= */
function loop(){
  X.clearRect(0,0,W,H);

  // screen shake decay
  if(shake.p>.03){
    shake.x=(Math.random()-.5)*shake.p*18;
    shake.y=(Math.random()-.5)*shake.p*18;
    shake.p*=.72;
  } else { shake.x=0; shake.y=0; }

  X.save();
  X.translate(shake.x,shake.y);

  drawBackground();
  drawStars();
  drawMoon();
  drawGround();
  drawTorches();
  drawEnvelope();
  if(!(phase==='leaving'&&leaveX<-200) && phase!=='open') drawWarrior();
  else if(phase==='leaving') drawWarrior();
  drawParts();

  X.restore();
  TICK++;
  requestAnimationFrame(loop);
}

/* =============================================
   BACKGROUND
============================================= */
function drawBackground(){
  // deep sky gradient
  const g=X.createLinearGradient(0,0,0,H*.72);
  g.addColorStop(0,'#000008');
  g.addColorStop(.3,'#06001a');
  g.addColorStop(.7,'#120030');
  g.addColorStop(1,'#1e0048');
  X.fillStyle=g; X.fillRect(0,0,W,H*.72);

  // nebula 1 (blue-purple)
  const n1=rg(W*.2,H*.15,0,H*.35,'rgba(60,10,130,.22)','transparent');
  X.fillStyle=n1; X.fillRect(0,0,W,H*.72);
  // nebula 2 (red-purple)
  const n2=rg(W*.78,H*.08,0,H*.28,'rgba(110,20,80,.16)','transparent');
  X.fillStyle=n2; X.fillRect(0,0,W,H*.72);
  // nebula 3 (center glow)
  const n3=rg(W*.5,H*.4,0,H*.5,'rgba(80,20,160,.1)','transparent');
  X.fillStyle=n3; X.fillRect(0,0,W,H*.72);

  // vignette
  const v=rg(W/2,H/2,H*.1,H*.9,'transparent','rgba(0,0,0,.65)');
  X.fillStyle=v; X.fillRect(0,0,W,H);
}

/* =============================================
   STARS  (parallax)
============================================= */
function drawStars(){
  STARS.forEach(s=>{
    const parallax=[.3,.6,1][s.layer];
    const bri=.25+.75*Math.sin(TICK*s.sp+s.ph);
    const baseR=s.r*[.6,.85,1.1][s.layer];
    X.fillStyle=`rgba(215,200,255,${bri*.7})`;
    X.shadowColor=`rgba(200,180,255,${bri*.3})`;
    X.shadowBlur=s.layer===2?4:0;
    circle(s.x*W, s.y*(H*.72), baseR);
    X.fill();
    X.shadowBlur=0;
  });
}

/* =============================================
   MOON
============================================= */
function drawMoon(){
  const mx=W*.8, my=H*.12, mr=Math.min(W,H)*.055;
  // outer glow
  X.fillStyle=rg(mx,my,mr*.5,mr*3,'rgba(220,200,140,.12)','transparent');
  circle(mx,my,mr*3); X.fill();
  // moon body
  X.fillStyle=rg(mx-mr*.3,my-mr*.3,0,mr,'#fffce8','#e8d898','#c8b868');
  circle(mx,my,mr); X.fill();
  // crescent shadow
  X.fillStyle=rg(mx+mr*.25,my,0,mr*.9,'rgba(0,0,12,.95)','rgba(0,0,12,0)');
  circle(mx,my,mr); X.fill();
  // crater details
  X.fillStyle='rgba(140,110,60,.25)';
  [[-.2,.2,.12],[.25,-.25,.08],[-.1,-.3,.06]].forEach(([dx,dy,cr])=>{
    circle(mx+dx*mr,my+dy*mr,cr*mr); X.fill();
  });
}

/* =============================================
   GROUND  (3D perspective stone floor)
============================================= */
function drawGround(){
  const gy=H*.68;

  // sky-ground blend
  X.fillStyle=lg(0,gy-40,0,gy+10,'rgba(25,0,55,.0)','rgba(25,0,55,.95)');
  X.fillRect(0,gy-40,W,50);

  // ground base
  X.fillStyle=lg(0,gy,0,H,'#160030','#0a0018','#04000e');
  X.fillRect(0,gy,W,H-gy);

  // stone tile perspective grid
  const vx=W/2, vy=gy;
  X.save();
  // horizontal rows
  for(let row=0;row<=10;row++){
    const t=row/10;
    const yy=gy+t*t*(H-gy);
    const alpha=.04+t*.14;
    const w=Math.min(1.5,t*2);
    X.strokeStyle=`rgba(160,80,255,${alpha})`;
    X.lineWidth=w;
    X.beginPath(); X.moveTo(0,yy); X.lineTo(W,yy); X.stroke();
  }
  // vertical vanishing lines
  const nv=22;
  for(let i=0;i<=nv;i++){
    const bx=W*i/nv;
    const dist=Math.abs(i-nv/2)/(nv/2);
    X.strokeStyle=`rgba(130,50,220,${.04+dist*.04})`;
    X.lineWidth=.6;
    X.beginPath(); X.moveTo(vx,vy); X.lineTo(bx,H); X.stroke();
  }
  X.restore();

  // horizon glow line
  X.fillStyle=lg(W*.05,gy,W*.95,gy,'transparent','rgba(212,168,71,.3)','rgba(212,168,71,.5)','rgba(212,168,71,.3)','transparent');
  X.fillRect(W*.05,gy-1,W*.9,2);

  // fog at bottom
  X.fillStyle=lg(0,H*.8,0,H,'transparent','rgba(4,0,14,.8)');
  X.fillRect(0,H*.8,W,H*.2);
}

/* =============================================
   TORCHES  (ambient lighting)
============================================= */
function drawTorches(){
  const gy=H*.68;
  const torches=[[W*.12,gy-10],[W*.88,gy-10]];
  torches.forEach(([tx,ty],idx)=>{
    const flicker=Math.sin(TICK*.18+idx*2.4)*.3+.7;
    const flicker2=Math.sin(TICK*.11+idx)*.2+.8;

    // ground light pool
    X.fillStyle=rg(tx,ty+20,0,90,`rgba(255,140,30,${.18*flicker})`,`rgba(255,100,0,${.08*flicker})`, 'transparent');
    X.beginPath(); X.ellipse(tx,ty+20,90,25,0,0,Math.PI*2); X.fill();

    // torch pole
    X.fillStyle=lg(tx-3,ty,tx+3,ty+40,'#8b6914','#5a4008');
    X.fillRect(tx-3,ty,6,40);

    // torch head
    X.fillStyle='#6b4a10';
    rr(tx-5,ty-10,10,14,2); X.fill();

    // flame layers
    for(let fl=3;fl>=0;fl--){
      const fh=22+fl*6;
      const fw=10-fl*1.5;
      const off=Math.sin(TICK*.14+fl+idx)*3;
      const a=[.9,.7,.5,.3][fl]*flicker2;
      const c=['rgba(255,220,60,','rgba(255,140,30,','rgba(255,60,0,','rgba(200,30,0,'][fl];
      X.fillStyle=`${c}${a})`;
      X.beginPath();
      X.moveTo(tx-fw/2+off,ty-10);
      X.bezierCurveTo(tx-fw+off,ty-fh*.4,tx-fw*.3+off,ty-fh*.8,tx+off,ty-fh);
      X.bezierCurveTo(tx+fw*.3+off,ty-fh*.8,tx+fw+off,ty-fh*.4,tx+fw/2+off,ty-10);
      X.closePath(); X.fill();
    }

    // flame glow on scene
    X.fillStyle=rg(tx,ty-15,0,120+flicker*20,`rgba(255,120,20,${.06*flicker})`, 'transparent');
    X.fillRect(0,0,W,H);
  });
}

/* =============================================
   ENVELOPE
============================================= */
function getEnvXY(){
  if(phase==='open') return {ex:W*.5, ey:H*.32};
  return {ex:W*.67, ey:H*.35};
}

function drawEnvelope(){
  const {ex,ey}=getEnvXY();
  const EW=Math.min(H*.28,220), EH=EW*.62;
  const bob=Math.sin(TICK*.026)*6;
  const isOpen=(phase==='open');

  X.save();
  X.translate(ex, ey+bob);

  // === DROP SHADOW 3D ===
  X.save();
  X.translate(14,18);
  X.globalAlpha=.2;
  X.fillStyle=rg(0,0,0,EW*.7,'rgba(30,0,70,.9)','transparent');
  rr(-EW/2,-EH/2,EW,EH,8); X.fill();
  X.restore();

  // === WINGS ===
  for(let si of [-1,1]){
    X.save(); X.scale(si,1);
    const wingFlap=Math.sin(TICK*.032+.5)*.22+(isOpen?.2:0);
    X.rotate(-.14-wingFlap);
    // 3 feather layers each side
    for(let L=2;L>=0;L--){
      X.save(); X.rotate(L*.06);
      const al=.6-L*.14;
      X.fillStyle=lg(0,0,EW*.9+L*10,0,
        `rgba(242,202,102,${al})`,
        `rgba(200,140,255,${al*.5})`,
        `rgba(160,80,255,.0)`);
      X.beginPath();
      X.moveTo(4,-EH*.26+L*4);

      X.bezierCurveTo(EW*.44,EH*(.54+L*.07),EW*.12,EH*.16,0,EH*.07);
      X.fill();
      // feather veins
      X.strokeStyle=`rgba(240,200,100,${.14-L*.04})`;
      X.lineWidth=.55;
      for(let v=0;v<7;v++){
        X.beginPath(); X.moveTo(0,0);
        X.quadraticCurveTo(
          EW*(v*.12+.04),(-EH*.24+v*4.5)*.7,
          EW*(v*.13+.05),-EH*.2+v*5
        );
        X.stroke();
      }
      X.restore();
    }
    X.restore();
  }

  // === ENVELOPE GLOW ===
  X.shadowColor='rgba(212,168,71,.5)';
  X.shadowBlur=40;

  // body parchment
  X.fillStyle=lg(-EW/2,-EH/2,EW/2,EH/2,'#fff8e4','#fde6bc','#f3cc8c');
  rr(-EW/2,-EH/2,EW,EH,7); X.fill();
  X.shadowBlur=0;

  // parchment texture
  X.strokeStyle='rgba(150,100,35,.06)';
  X.lineWidth=.7;
  for(let i=1;i<7;i++){
    X.beginPath();
    X.moveTo(-EW/2+8,-EH/2+EH*i/7);
    X.lineTo(EW/2-8,-EH/2+EH*i/7);
    X.stroke();
  }

  // border gold
  X.strokeStyle=lg(-EW/2,-EH/2,EW/2,EH/2,'#b8883a','#f0c96a','#d4a847','#b8883a');
  X.lineWidth=2;
  rr(-EW/2,-EH/2,EW,EH,7); X.stroke();

  // === FLAP ===
  if(!isOpen){
    // closed flap down
    X.fillStyle=lg(-EW/2,-EH/2,0,-EH/2+EH*.45,'#f0d8a0','#e8cc90');
    X.beginPath();
    X.moveTo(-EW/2,-EH/2);
    X.lineTo(0,-EH/2+EH*.43);
    X.lineTo(EW/2,-EH/2);
    X.closePath(); X.fill();
    X.strokeStyle='rgba(212,168,71,.4)'; X.lineWidth=1; X.stroke();

    // WAX SEAL
    X.shadowColor='rgba(180,25,25,.6)'; X.shadowBlur=16;
    X.fillStyle=rg(-2,-2,0,16,'#ec4848','#a81818','#680808');
    circle(0,-EH/2+EH*.44,16); X.fill();
    X.shadowBlur=0;
    X.strokeStyle='rgba(255,170,170,.28)'; X.lineWidth=1;
    circle(0,-EH/2+EH*.44,12); X.stroke();
    // seal rune
    X.fillStyle='#ffd8d8';
    X.font=`bold 13px serif`;
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText('♥',0,-EH/2+EH*.44);

  } else {
    // open flap up
    X.fillStyle=lg(-EW/2,-EH/2,0,-EH/2-EH*.38,'#f0d8a0','#e8cc90');
    X.beginPath();
    X.moveTo(-EW/2,-EH/2);
    X.lineTo(0,-EH/2-EH*.42);
    X.lineTo(EW/2,-EH/2);
    X.closePath(); X.fill();
    X.strokeStyle='rgba(212,168,71,.38)'; X.lineWidth=1; X.stroke();

    // LETTER emerging
    const elapsed=TICK-openTick;
    const rise=Math.min(EH*.7, elapsed*1.6);
    const a=Math.min(1, elapsed*.05);
    const LW=EW*.7, LH=EH*.9;

    X.save();
    X.globalAlpha=a;
    // letter shadow
    X.save(); X.translate(8,10); X.globalAlpha=.15;
    X.fillStyle='rgba(30,0,60,.8)';
    rr(-LW/2,-EH/2-rise,LW,LH,5); X.fill();
    X.restore();
    // letter body
    X.shadowColor='rgba(212,168,71,.25)'; X.shadowBlur=18;
    X.fillStyle=lg(-LW/2,-EH/2-rise,LW/2,-EH/2-rise+LH,'#fffef5','#fff8e8','#fef0d4');
    rr(-LW/2,-EH/2-rise,LW,LH,5); X.fill();
    X.shadowBlur=0;
    X.strokeStyle='rgba(212,168,71,.35)'; X.lineWidth=1;
    rr(-LW/2,-EH/2-rise,LW,LH,5); X.stroke();
    // letter lines
    X.strokeStyle='rgba(170,130,55,.1)'; X.lineWidth=.65;
    for(let li=1;li<6;li++){
      X.beginPath();
      X.moveTo(-LW/2+9,-EH/2-rise+LH*li/6);
      X.lineTo(LW/2-9,-EH/2-rise+LH*li/6);
      X.stroke();
    }
    // letter content
    const fs=Math.max(12,Math.round(LW*.1));
    X.textAlign='center'; X.textBaseline='middle';
    X.font=`italic ${fs}px EB Garamond,serif`;
    X.fillStyle='rgba(65,10,115,.85)';
    X.fillText('I Love You',0,-EH/2-rise+LH*.33);
    X.font=`700 ${Math.max(10,fs-2)}px Cinzel,serif`;
    X.fillStyle='rgba(212,168,71,.98)';
    X.fillText('Frontini ♥',0,-EH/2-rise+LH*.58);
    X.font=`italic ${Math.max(9,fs-4)}px EB Garamond,serif`;
    X.fillStyle='rgba(65,10,115,.5)';
    X.fillText('pour toujours…',0,-EH/2-rise+LH*.76);
    X.restore();
  }

  X.restore();
}

  return W*.33;
}

  X.fillText('♦',0,0);
  X.restore(); X.restore(); // end shield arm

  X.restore(); // end warrior
}

/* =============================================
   INPUT / GAME LOGIC
============================================= */
const VALID=['kouadio','mela','marie','christianne'];

function tryCode(){
  const inp=document.getElementById('inp');
  const v=inp.value.trim().toLowerCase();
  if(VALID.includes(v)){
    inp.classList.remove('err'); inp.classList.add('ok');
    document.getElementById('emsg').textContent='';
    const b=document.getElementById('btn');
    b.textContent='✓  Accès Accordé…';
    b.style.color='#86efac'; b.style.borderColor='rgba(80,255,140,.38)';
    setTimeout(doUnlock, 850);
  } else {
    inp.classList.remove('ok'); inp.classList.add('err');
    setTimeout(()=>inp.classList.remove('err'),450);
    document.getElementById('emsg').textContent='⚔  Le gardien reste en position de combat.';
    doAttack();
  }
}
document.getElementById('inp').addEventListener('keydown',e=>{
  if(e.key==='Enter') tryCode();
});

/* ATTACK SEQUENCE */
function doAttack(){
  if(phase!=='idle') return;
  phase='attack'; atkTimer=0; shake.p=1.1;
  const iv=setInterval(()=>{
    atkTimer++;
    if(atkTimer===22){
      // impact burst
      const ex=W*.67, ey=H*.46;
      burst(ex,ey,30,['#ff8888','#ffbbbb','#ffffff','#ffdada'],7);
      burst(ex,ey,20,['#ff6060','#ffaaaa'],5,1.5);
      shake.p=1.9;
    }
    if(atkTimer>=58){
      clearInterval(iv);
      phase='returning'; retTimer=0;
      const rv=setInterval(()=>{
        retTimer++;
        if(retTimer>=38){clearInterval(rv); phase='idle';}
      },16);
    }
  },16);
}

/* UNLOCK SEQUENCE */
function doUnlock(){
  phase='leaving'; leaveX=W*.33;
  const goldColors=['#d4a847','#f0c96a','#c084fc','#f472b6','#a5f3fc','#fef0dc'];
  const iv=setInterval(()=>{
    leaveX-=8;
    // leaving steps
    if(leaveX<W*.18){
      burst(leaveX+20, H*.6, 4, goldColors, 4);
    }
    if(leaveX<-180){
      clearInterval(iv);
      // envelope burst
      const {ex,ey}=getEnvXY();
      burst(ex,ey,60,goldColors,6.5);
      burst(ex,ey-20,30,['#ffffff','#fef0dc','#f0c96a'],4);
      shake.p=.5;
      setTimeout(()=>{
        phase='open'; openTick=TICK;
        document.getElementById('lockUI').classList.add('hide');
        setTimeout(()=>{
          const s=document.getElementById('sucUI');
          s.style.display='flex';
          s.style.pointerEvents='auto';
          // celebration burst
          setTimeout(()=>{
            burst(W/2,H*.42,70,goldColors,7);
            burst(W/2,H*.42,40,['#ffffff','#fef0dc'],5);
          },700);
        },200);
      },380);
    }
  },16);
}

/* click sparks on success */
document.addEventListener('click',e=>{
  if(phase!=='open') return;
  const cols=['#d4a847','#c084fc','#f472b6','#60a5fa','#fef0dc','#f0c96a'];
  for(let i=0;i<12;i++){
    const sp=document.createElement('div');
    const a=Math.random()*Math.PI*2, d=Math.random()*130+60;
    sp.className='spk';
    sp.style.cssText=`
      left:${e.clientX}px;top:${e.clientY}px;
      width:${Math.floor(Math.random()*7+4)}px;
      height:${Math.floor(Math.random()*7+4)}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      --d:${(.7+Math.random()*.8).toFixed(2)}s;
      --tx:${(Math.cos(a)*d).toFixed(0)}px;
      --ty:${(Math.sin(a)*d-55).toFixed(0)}px;
      animation-delay:${i*28}ms;
    `;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),2500);
  }
});

/* ── GO ── */
loop();
